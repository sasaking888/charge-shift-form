<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>CHARGE 売上表</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<style>
:root{
  --bg:#F3F5F9; --surface:#FFFFFF; --ink:#121826; --muted:#6B7385;
  --line:#E4E8F0; --line2:#EEF1F6; --blue:#3B7DD8; --blue-soft:#EAF2FC;
  --risk:#D45B6A; --good:#1F9D63; --shadow:0 1px 2px rgba(18,24,38,.04),0 4px 14px rgba(18,24,38,.03);
  --num:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;padding:14px;padding-bottom:40px;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto}
.topnav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.topnav .links{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.topnav a,.topnav .navbtn{
  display:inline-block;border:1px solid var(--line);background:var(--surface);border-radius:999px;
  padding:6px 12px;font-size:12px;font-weight:700;color:var(--ink);text-decoration:none;font-family:inherit;cursor:pointer
}
.topnav a.on{background:var(--ink);border-color:var(--ink);color:#fff}
.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px;
  box-shadow:var(--shadow);margin-bottom:14px}
h1{font-size:18px;margin:0;font-weight:800;letter-spacing:-.02em}
h2{font-size:14px;margin:0 0 12px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
h2 .sub{font-size:12px;font-weight:600;color:var(--muted)}
.hint{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.5}
.msg{font-size:13px;color:var(--muted);text-align:center;margin:24px 0}
.err{color:var(--risk)}
.head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.mnav{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:4px}
.mnav button{
  border:0;background:transparent;border-radius:8px;padding:6px 12px;
  font-size:13px;cursor:pointer;font-family:inherit;color:var(--ink);font-weight:700
}
.mnav button:hover{background:var(--surface)}
.mnav .mon{font-weight:800;font-size:14px;min-width:7em;text-align:center;padding:0 4px}
/* KPI */
.sum-cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
@media (max-width:720px){.sum-cards{grid-template-columns:repeat(2,minmax(0,1fr))}}
.sum-card{
  background:linear-gradient(180deg,#fff 0%,#F8FAFC 100%);
  border:1px solid var(--line);border-radius:14px;padding:14px 12px;text-align:left;min-width:0
}
.sum-card.accent{border-color:#C9DCF5;background:linear-gradient(180deg,#F7FBFF 0%,#EEF5FC 100%)}
.sum-card .k{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;letter-spacing:.02em}
.sum-card .v{font-size:20px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.2;word-break:break-all}
.sum-card .v.sm{font-size:17px}
/* tables */
.table-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  border:1px solid var(--line);border-radius:12px;background:#fff
}
table.sales,table.wtable{
  width:100%;border-collapse:separate;border-spacing:0;
  font-size:13px;font-variant-numeric:tabular-nums
}
table.sales{min-width:720px}
table.sales th,table.wtable th{
  text-align:left;font-size:11px;color:var(--muted);font-weight:700;
  padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;
  background:#F8FAFC;position:sticky;top:0;z-index:2;letter-spacing:.01em
}
table.sales th.r,table.sales td.r,table.wtable th.r,table.wtable td.r{text-align:right}
table.sales td,table.wtable td{
  padding:10px 12px;border-bottom:1px solid var(--line2);vertical-align:middle;white-space:nowrap
}
table.sales tbody tr:last-child td,table.wtable tbody tr:last-child td{border-bottom:0}
table.sales tbody tr:hover,table.wtable tbody tr:hover{background:#F7FAFF}
table.sales tbody tr.dim{opacity:.42}
table.sales tbody tr.dim:hover{opacity:.7}
table.sales td.date-cell{
  position:sticky;left:0;z-index:1;background:#fff;font-weight:700;
  border-right:1px solid var(--line2);min-width:5.5em
}
table.sales tbody tr:hover td.date-cell{background:#F7FAFF}
table.sales th.date-cell{position:sticky;left:0;z-index:3;border-right:1px solid var(--line);min-width:5.5em}
table.sales td.money,table.wtable td.money{font-weight:700;color:var(--ink)}
table.sales td.main,table.wtable td.main{font-weight:800;color:#1a4f9c}
table.sales td.muted,table.wtable td.muted{color:var(--muted);font-size:12.5px}
table.sales tfoot td,table.wtable tfoot td{
  font-weight:800;border-top:1px solid var(--line);border-bottom:0;
  padding:12px;background:#F8FAFC
}
table.wtable{min-width:520px}
table.wtable td.range{font-weight:700}
.wx{font-size:14px;line-height:1}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.toolbar .left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.chip{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;
  color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:3px 9px
}
.toggle-btn{
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)
}
.toggle-btn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.detail-wrap{display:none;margin-top:12px}
.detail-wrap.show{display:block}
.foot{text-align:center;font-size:10px;color:#9AA3AF;margin-top:8px}
.badge{display:inline-block;font-size:10px;font-weight:700;background:var(--blue-soft);border:1px solid #D0E3F8;border-radius:999px;padding:2px 8px;color:#2A5FA8}
.updated{font-size:11px;color:var(--muted);margin:12px 0 0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.updated .dot{width:7px;height:7px;border-radius:50%;background:var(--good);flex-shrink:0;box-shadow:0 0 0 3px rgba(31,157,99,.15)}
.updated .dot.off{background:#9AA3AF;box-shadow:none}
.updated button{
  border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:4px 10px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--ink)
}
.updated button:hover{background:var(--bg)}
.dash{color:#C0C6D0}
/* store tabs */
.store-tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.store-tabs button{
  border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;
  font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;color:var(--ink)
}
.store-tabs button:hover{background:var(--bg)}
.store-tabs button.on{background:var(--ink);border-color:var(--ink);color:#fff}
.store-tabs button:disabled{opacity:.45;cursor:not-allowed}
.setup-box{
  background:var(--bg);border:1px dashed var(--line);border-radius:12px;padding:18px 16px;text-align:left
}
.setup-box p{margin:0 0 8px;font-size:13px;color:var(--muted);line-height:1.55}
.setup-box p:last-child{margin:0}
.setup-box b{color:var(--ink)}
.setup-box code{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topnav">
    <div class="links">
      <a href="top.html">← 管理TOP</a>
      <a href="admin.html?v=1.5">シフト管理</a>
      <a href="cost.html?v=1.1">週次人件費</a>
      <a href="sales.html?v=2.7" class="on">売上表</a>
    </div>
    <div class="links">
      <button type="button" class="navbtn" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="card">
    <div class="head">
      <h1>売上表 <span class="badge">自動更新</span></h1>
      <div class="mnav">
        <button type="button" onclick="moveMonth(-1)">◀</button>
        <span class="mon" id="monLabel"></span>
        <button type="button" onclick="moveMonth(1)">▶</button>
      </div>
    </div>
    <div class="store-tabs" id="storeTabs"></div>
    <div class="sum-cards" id="summary"></div>
    <p class="updated" id="updatedLine">
      <span class="dot off" id="liveDot"></span>
      <span id="updatedText">未取得</span>
      <button type="button" onclick="load(false)">今すぐ更新</button>
    </p>
  </div>
  <div id="content"><p class="msg">準備中…</p></div>
  <div class="foot">sales v2.7 · 吉祥寺 / 北千住</div>
</div>
<script>
// ===== 設定（店舗ごとにスプシIDを入れる） =====
// ssId: スプシURLの /d/XXXX/ の XXXX。空だと「未接続」表示。
// sheetPrefs: タブ名の優先順（{y}{m} を置換）。見つからなければ他候補も試す。
// 共有: リンクを知っている全員が閲覧可
const STORES = [
  {
    id: 'K1',
    name: '吉祥寺',
    ssId: '1tkaQzpRwSehJwl4tfZVqARGxORHjxY3g1XM7A1bkdwo', // 【本部】CHARGEサンロード吉祥寺
    sheetPrefs: ['{y}.{m}月', '{y}.{m}', '{y}年{m}月', '{m}月']
  },
  {
    id: 'K2',
    name: '北千住',
    ssId: '1P2gIUXQMthbjIlK_Wcq5yrYJOPe2RtrrwTUbiiwO0t8', // 【本部】CHARGEエキア北千住
    sheetPrefs: ['{y}.{m}', '{y}.{m}月', '{y}年{m}月', '{m}月']
  }
];
const ADMIN_KEY_STORAGE = 'chargeAdminKey';
const STORE_STORAGE = 'chargeSalesStoreId';
/** 自動再読込間隔（ミリ秒） */
const AUTO_REFRESH_MS = 2 * 60 * 1000;

/** 日次のメイン表示（この順）。それ以外は「詳細」に回す */
const MAIN_COLS = ['施術人数','リピート客数','現金','キャッシュレス','総売上','単価','備考'];
const SUM_HINTS = ['施術人数','施+回','リピート客数','リ+回','現金','キャッシュレス','総売上','税抜','回数券購入','回数券利用人数','回数券利用枚数'];
const SHORT_LABEL = {
  '施術人数':'施術',
  'リピート客数':'リピ',
  'キャッシュレス':'キャッシュ',
  '総売上':'総売上',
  '回数券利用人数':'券・人数',
  '回数券利用枚数':'券・枚数',
  '回数券購入':'券購入',
  '割引チケット(チラシ)':'割引チラシ',
  '割引チケット(アプリ)':'割引アプリ',
  '施術売上(回数券購入抜き+回数券使用)':'施術売上'
};

let cur = { y: 0, m: 0 };
let storeId = STORES[0].id;
let headers = [];
let rows = [];
let loading = false;
let refreshTimer = null;
let lastOkAt = null;
let showDetail = false;

function store(){
  return STORES.find(function(s){ return s.id === storeId; }) || STORES[0];
}
function storeLabel(){ return store().name; }
function renderStoreTabs(){
  const el = document.getElementById('storeTabs');
  if (!el) return;
  el.innerHTML = STORES.map(function(s){
    const on = s.id === storeId ? ' on' : '';
    const miss = !s.ssId ? ' · 未接続' : '';
    return '<button type="button" class="' + on.trim() + '" onclick="selectStore(\'' + s.id + '\')">' +
      esc(s.name) + (miss ? '<span style="font-weight:600;opacity:.75">' + miss + '</span>' : '') +
      '</button>';
  }).join('');
}
function selectStore(id){
  if (storeId === id) return;
  storeId = id;
  try { localStorage.setItem(STORE_STORAGE, id); } catch (e) {}
  showDetail = false;
  headers = [];
  rows = [];
  document.getElementById('summary').innerHTML = '';
  renderStoreTabs();
  load(false);
}

function esc(s){
  return String(s).replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]);
  });
}
function yen(n){ return '¥' + Math.round(n).toLocaleString(); }
function setMsg(t, isErr){
  document.getElementById('content').innerHTML =
    '<div class="card"><p class="msg' + (isErr ? ' err' : '') + '">' + t + '</p></div>';
}
function toNum(v){
  if (v === '' || v === null || v === undefined) return null;
  if (typeof v === 'number') return isNaN(v) ? null : v;
  const s = String(v).replace(/,/g, '').replace(/[¥円]/g, '').trim();
  if (!s || s.charAt(0) === '#') return null; // #DIV/0! など
  const n = Number(s);
  return isNaN(n) ? null : n;
}
function sheetNameCandidates(y, m){
  const st = store();
  const prefs = (st && st.sheetPrefs) || ['{y}.{m}月', '{y}.{m}', '{y}年{m}月', '{m}月'];
  const seen = {};
  const out = [];
  prefs.forEach(function(p){
    const n = p.replace(/\{y\}/g, String(y)).replace(/\{m\}/g, String(m));
    if (!seen[n]) { seen[n] = 1; out.push(n); }
  });
  return out;
}
/** 日次売上表らしいか（誤タブを弾く） */
function looksLikeDailySales(dt){
  if (!dt || dt.getNumberOfColumns() < 3) return false;
  let labels = '';
  for (let c = 0; c < dt.getNumberOfColumns(); c++) {
    labels += '|' + String(dt.getColumnLabel(c) || '');
  }
  return /総売上|施術人数|キャッシュレス|リピート/.test(labels);
}
function isSumCol(name){
  if (!name) return false;
  if (name.indexOf('単価') >= 0) return false;
  if (SUM_HINTS.indexOf(name) >= 0) return true;
  return /人数|客数|売上|現金|キャッシュ|税抜|回数券/.test(name) && name.indexOf('曜日') < 0;
}
function isMoneyCol(name){ return /売上|現金|キャッシュ|税抜|円/.test(name || ''); }
function isUnitCol(name){ return !!(name && name.indexOf('単価') >= 0); }
function isMetaCol(name){
  if (!name) return true;
  if (name === '日付' || name === '曜日' || name === '天気' || name === 'memo' || name === 'memo ') return true;
  if (/^\d{1,2}月$/.test(name)) return true;
  return false;
}
function shortLabel(h){ return SHORT_LABEL[h] || h; }
function dash(){ return '<span class="dash">–</span>'; }
/** セル表示用。単価は小数なし整数 */
function fmtCell(h, v){
  if (v === '' || v == null) return null;
  if (isUnitCol(h)) {
    const n = toNum(v);
    return n === null ? null : Math.round(n).toLocaleString();
  }
  if (isSumCol(h) || h === '新規') {
    const n = toNum(v);
    if (n === null) return null;
    return isMoneyCol(h) ? yen(n) : Math.round(n).toLocaleString();
  }
  const s = String(v).trim();
  return s === '' ? null : s;
}
function cellHtml(h, v, extraClass){
  const t = fmtCell(h, v);
  const cls = [];
  if (h !== '備考') cls.push('r');
  if (extraClass) cls.push(extraClass);
  if (h === '総売上') cls.push('main');
  else if (isMoneyCol(h)) cls.push('money');
  else if (isUnitCol(h) || h === '備考') cls.push('muted');
  const c = cls.length ? ' class="' + cls.join(' ') + '"' : '';
  if (t === null) return '<td' + c + '>' + dash() + '</td>';
  return '<td' + c + '>' + esc(t) + '</td>';
}
function dayLabel(r){
  const m = cur.m;
  const wd = r.values['曜日'] ? String(r.values['曜日']).trim() : '';
  return m + '/' + r.day + (wd ? '（' + wd + '）' : '');
}
function rowIsEmpty(r){
  const sales = toNum(r.values['総売上']);
  const guests = toNum(r.values['施術人数']);
  if ((sales === null || sales === 0) && (guests === null || guests === 0)) return true;
  return false;
}
function newOfRow(r){
  const newKey = findHeader(['新規客数', '新規', '新規客', '新患']);
  if (newKey) return toNum(r.values[newKey]);
  const g = toNum(r.values['施術人数']);
  const p = toNum(r.values['リピート客数']);
  if (g === null && p === null) return null;
  return Math.max(0, (g || 0) - (p || 0));
}
function mainColsPresent(){
  return MAIN_COLS.filter(function(h){
    if (h === '備考') return headers.indexOf('備考') >= 0 || headers.some(function(x){ return /^memo/i.test(x); });
    return headers.indexOf(h) >= 0;
  });
}
function detailColsPresent(){
  const mainSet = {};
  MAIN_COLS.forEach(function(h){ mainSet[h] = 1; });
  return headers.filter(function(h){
    if (!h || isMetaCol(h) || mainSet[h]) return false;
    if (/^memo/i.test(h)) return false;
    return true;
  });
}
function valFor(r, h){
  if (h === '備考') {
    if (r.values['備考'] != null && String(r.values['備考']).trim() !== '') return r.values['備考'];
    for (const k in r.values) {
      if (/^memo/i.test(k) && r.values[k] != null && String(r.values[k]).trim() !== '') return r.values[k];
    }
    return '';
  }
  return r.values[h];
}
function toggleDetail(){
  showDetail = !showDetail;
  const wrap = document.getElementById('detailWrap');
  const btn = document.getElementById('detailBtn');
  if (wrap) wrap.classList.toggle('show', showDetail);
  if (btn) {
    btn.classList.toggle('on', showDetail);
    btn.textContent = showDetail ? '詳細列を隠す' : '詳細列を表示';
  }
}

function getWeeks(y, m){
  const dim = new Date(y, m, 0).getDate();
  const weeks = [];
  for (let start = 1; start <= dim; start += 7) {
    const end = Math.min(start + 6, dim);
    const days = [];
    for (let d = start; d <= end; d++) days.push(d);
    weeks.push({ days: days, label: '第' + (weeks.length + 1) + '週', range: m + '/' + start + '〜' + m + '/' + end });
  }
  return weeks;
}

function logout(){
  localStorage.removeItem(ADMIN_KEY_STORAGE);
  location.href = 'top.html';
}

function moveMonth(dir){
  cur.m += dir;
  if (cur.m < 1) { cur.m = 12; cur.y--; }
  if (cur.m > 12) { cur.m = 1; cur.y++; }
  load(false);
}

function pad2(n){ return String(n).padStart(2, '0'); }
function fmtTime(d){
  return d.getFullYear() + '/' + pad2(d.getMonth() + 1) + '/' + pad2(d.getDate()) +
    ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
}
function setUpdated(ok, extra){
  const dot = document.getElementById('liveDot');
  const text = document.getElementById('updatedText');
  if (!dot || !text) return;
  if (ok) {
    lastOkAt = new Date();
    dot.classList.remove('off');
    text.textContent = storeLabel() + ' · 最終更新 ' + fmtTime(lastOkAt) +
      ' · 約' + (AUTO_REFRESH_MS / 60000) + '分ごと' + (extra || '');
  } else {
    dot.classList.add('off');
    text.textContent = extra || '更新に失敗しました';
  }
}

function scheduleAutoRefresh(){
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(function(){
    if (document.hidden) return; // 裏タブはスキップ
    load(true);
  }, AUTO_REFRESH_MS);
}

function boot(){
  if (!localStorage.getItem(ADMIN_KEY_STORAGE)) {
    location.href = 'top.html';
    return;
  }
  const saved = localStorage.getItem(STORE_STORAGE);
  if (saved && STORES.some(function(s){ return s.id === saved; })) storeId = saved;
  const now = new Date();
  cur.y = now.getFullYear();
  cur.m = now.getMonth() + 1;
  renderStoreTabs();
  setMsg('Googleスプレッドシート接続中…');
  google.charts.load('current', { packages: ['corechart'] });
  google.charts.setOnLoadCallback(function(){
    load(false);
    scheduleAutoRefresh();
  });
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden) load(true);
  });
}

function showStoreSetup(st){
  document.getElementById('summary').innerHTML = '';
  document.getElementById('content').innerHTML =
    '<div class="card"><div class="setup-box">' +
    '<p><b>' + esc(st.name) + '</b> の売上スプシがまだ未接続です。</p>' +
    '<p>① 北千住用スプシを開き、右上「共有」→ <b>リンクを知っている全員 / 閲覧者</b></p>' +
    '<p>② URLをこのチャットに送ってください（例: https://docs.google.com/spreadsheets/d/<code>xxxx</code>/edit ）</p>' +
    '<p>③ 接続後、このタブで吉祥寺と同じ形式（タブ名 <code>2026.7月</code> など）の表が表示されます。</p>' +
    '</div></div>';
  setUpdated(false, esc(st.name) + ' · スプシ未接続');
}

/**
 * @param {boolean} silent true=表示を消さず裏で再取得（自動更新用）
 */
function load(silent){
  if (loading) return;
  const st = store();
  document.getElementById('monLabel').textContent = cur.y + '年' + cur.m + '月';
  if (!st.ssId) {
    loading = false;
    showStoreSetup(st);
    return;
  }
  loading = true;
  const candidates = sheetNameCandidates(cur.y, cur.m);
  if (!silent) setMsg('読み込み中…（' + esc(st.name) + '）');
  else setUpdated(!!lastOkAt, lastOkAt ? ' · 更新中…' : '');
  tryLoadSheet(st, candidates, 0, silent, []);
}

function tryLoadSheet(st, candidates, idx, silent, tried){
  if (idx >= candidates.length) {
    loading = false;
    if (!silent) {
      setMsg(
        '読み込みエラー（' + esc(st.name) + '）: 月次タブが見つかりません。<br>' +
        '試した名前: ' + esc(tried.join(' / ')) +
        '<br><br>タブ名が「2026.7月」または「2026.7」形式か、' +
        '共有が「リンクを知っている全員が閲覧可」か確認してください。',
        true
      );
      document.getElementById('summary').innerHTML = '';
    }
    setUpdated(false, '読み込みエラー（次の自動更新で再試行）');
    return;
  }
  const name = candidates[idx];
  tried.push(name);
  const url = 'https://docs.google.com/spreadsheets/d/' + st.ssId +
    '/gviz/tq?sheet=' + encodeURIComponent(name) + '&_=' + Date.now() + idx;
  const query = new google.visualization.Query(url);
  query.send(function(res){
    if (res.isError() || !looksLikeDailySales(res.getDataTable())) {
      tryLoadSheet(st, candidates, idx + 1, silent, tried);
      return;
    }
    loading = false;
    parseDailyTable(res.getDataTable(), name);
  });
}

function parseDailyTable(dt, name){
    // ヘッダ（空列は捨てる）
    headers = [];
    const colMap = []; // dataTable列 index
    for (let c = 0; c < dt.getNumberOfColumns(); c++) {
      const lab = String(dt.getColumnLabel(c) || '').trim();
      if (!lab) continue;
      headers.push(lab);
      colMap.push(c);
    }
    // 日付列: 「7月」など / 先頭が日の表（北千住は長文ヘッダ）
    let dateIdx = 0;
    for (let i = 0; i < headers.length; i++) {
      if (/^\d{1,2}月$/.test(headers[i]) || headers[i] === '日付' || /\d{1,2}月$/.test(headers[i])) {
        dateIdx = i; break;
      }
    }
    // 先頭列が曜日なら日付はさらに左…ここでは通常0列目
    if (headers[0] === '曜日' && headers.length > 1) dateIdx = 0;
    const dateCol = colMap[dateIdx];
    const mPrefix = cur.y + '-' + String(cur.m).padStart(2, '0');
    // シート下部に別表（日がもう一度並ぶ）があるため:
    // 日次ブロックのあとに空日行が出たら本表終了。同じ日は先勝ち。
    const byDay = {};
    let inDaily = false;
    let dailyDone = false;
    for (let r = 0; r < dt.getNumberOfRows(); r++) {
      let dayRaw = dt.getValue(r, dateCol);
      let dayNum = null;
      if (dayRaw === '' || dayRaw === null || dayRaw === undefined) {
        dayNum = null;
      } else if (typeof dayRaw === 'number') {
        dayNum = dayRaw;
      } else if (dayRaw instanceof Date) {
        dayNum = dayRaw.getDate();
      } else {
        const s = String(dayRaw).trim();
        if (!s) dayNum = null;
        // 「2月1日」形式はスキップ（別フォーマットの誤タブ）
        else if (/月/.test(s) && /日/.test(s)) dayNum = null;
        else dayNum = parseInt(s.replace(/[^\d]/g, ''), 10);
      }
      if (!dayNum || dayNum < 1 || dayNum > 31 || dayNum !== Math.floor(dayNum)) {
        if (inDaily) dailyDone = true; // 合計行などで本表終了
        continue;
      }
      if (dailyDone) continue; // 下部の別表は無視
      if (byDay[dayNum]) continue; // 同日は先勝ち
      inDaily = true;

      const values = {};
      let any = false;
      for (let i = 0; i < headers.length; i++) {
        const c = colMap[i];
        const h = headers[i];
        // 日付列ヘッダが長文のときは「日付」キーに寄せない（表示は dayLabel）
        const key = (i === dateIdx) ? ('__day__') : h;
        let v = dt.getValue(r, c);
        if (v instanceof Date) v = (v.getMonth() + 1) + '/' + v.getDate();
        let fv = dt.getFormattedValue(r, c);
        if (fv && String(fv).charAt(0) === '#') fv = ''; // #DIV/0!
        if (i !== dateIdx && fv !== '' && fv != null) any = true;
        if (i === dateIdx) continue;
        if (typeof v === 'number') {
          values[key] = isUnitCol(key) ? Math.round(v) : v;
        } else if (isUnitCol(key)) {
          const n = toNum(fv);
          values[key] = n === null ? '' : Math.round(n);
        } else {
          values[key] = fv;
        }
      }
      if (!any) continue;
      const date = mPrefix + '-' + String(dayNum).padStart(2, '0');
      values['日付'] = date;
      byDay[dayNum] = { date: date, day: dayNum, values: values };
    }
    rows = Object.keys(byDay).map(function(k){ return byDay[k]; })
      .sort(function(a, b){ return a.day - b.day; });
    // 表示用ヘッダから日付の長文列を除く
    headers = headers.filter(function(h, i){ return i !== dateIdx; });
    render(name);
    setUpdated(true);
}

function sumField(key){
  let t = 0, any = false;
  rows.forEach(function(r){
    const n = toNum(r.values[key]);
    if (n !== null) { t += n; any = true; }
  });
  return any ? t : null;
}

function findHeader(cands){
  for (let i = 0; i < cands.length; i++) {
    if (headers.indexOf(cands[i]) >= 0) return cands[i];
  }
  return null;
}

function render(sheetNm){
  // --- KPI（主要4つだけ） ---
  const guestT = sumField('施術人数');
  const repT = sumField('リピート客数');
  let newT = 0, anyNew = false;
  rows.forEach(function(r){
    const n = newOfRow(r);
    if (n !== null) { newT += n; anyNew = true; }
  });
  const salesT = sumField('総売上');
  let sumHtml = '';
  sumHtml += '<div class="sum-card accent"><div class="k">総売上（月）</div><div class="v">' +
    (salesT === null ? '–' : yen(salesT)) + '</div></div>';
  sumHtml += '<div class="sum-card"><div class="k">施術人数</div><div class="v">' +
    (guestT === null ? '–' : Math.round(guestT).toLocaleString()) + '</div></div>';
  sumHtml += '<div class="sum-card"><div class="k">新規</div><div class="v">' +
    (anyNew ? Math.round(newT).toLocaleString() : '–') + '</div></div>';
  sumHtml += '<div class="sum-card"><div class="k">リピーター</div><div class="v">' +
    (repT === null ? '–' : Math.round(repT).toLocaleString()) + '</div></div>';
  document.getElementById('summary').innerHTML = sumHtml;

  const mains = mainColsPresent();
  const details = detailColsPresent();
  const hasWeather = headers.indexOf('天気') >= 0;

  let html = '';

  // --- 週一覧を上に（見やすいサマリ優先） ---
  const weeks = getWeeks(cur.y, cur.m);
  const moneyKey = headers.indexOf('総売上') >= 0 ? '総売上' : null;
  const guestKey = findHeader(['施術人数']);
  const repeatKey = findHeader(['リピート客数', 'リピーター', 'リピ客数']);

  html += '<div class="card">';
  html += '<h2>週一覧 <span class="sub">月1日始まり · ' + esc(storeLabel()) + '</span></h2>';
  html += '<div class="table-wrap"><table class="wtable"><thead><tr>';
  html += '<th>期間</th><th class="r">施術</th><th class="r">新規</th><th class="r">リピ</th>';
  if (moneyKey) html += '<th class="r">総売上</th>';
  html += '</tr></thead><tbody>';

  weeks.forEach(function(wk){
    const wrows = rows.filter(function(r){ return wk.days.indexOf(r.day) >= 0; });
    let neu = 0, rep = 0, guestsSum = 0, sales = 0;
    let anyN = false, anyR = false, anyG = false, anyS = false;
    wrows.forEach(function(r){
      const guests = guestKey ? toNum(r.values[guestKey]) : null;
      const rpts = repeatKey ? toNum(r.values[repeatKey]) : null;
      const news = newOfRow(r);
      if (guests !== null) { guestsSum += guests; anyG = true; }
      if (news !== null) { neu += news; anyN = true; }
      if (rpts !== null) { rep += rpts; anyR = true; }
      if (moneyKey) {
        const s = toNum(r.values[moneyKey]);
        if (s !== null) { sales += s; anyS = true; }
      }
    });
    html += '<tr>';
    html += '<td class="range">' + esc(wk.range) + '</td>';
    html += '<td class="r">' + (anyG ? Math.round(guestsSum).toLocaleString() : dash()) + '</td>';
    html += '<td class="r">' + (anyN ? Math.round(neu).toLocaleString() : dash()) + '</td>';
    html += '<td class="r">' + (anyR ? Math.round(rep).toLocaleString() : dash()) + '</td>';
    if (moneyKey) html += '<td class="r main">' + (anyS ? yen(sales) : dash()) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // --- 日次 ---
  html += '<div class="card">';
  html += '<div class="toolbar"><div class="left">';
  html += '<h2 style="margin:0">日次 <span class="sub">' + esc(sheetNm) + '</span></h2>';
  html += '<span class="chip">' + rows.length + '日</span>';
  html += '</div>';
  if (details.length) {
    html += '<button type="button" class="toggle-btn' + (showDetail ? ' on' : '') +
      '" id="detailBtn" onclick="toggleDetail()">' +
      (showDetail ? '詳細列を隠す' : '詳細列を表示') + '</button>';
  }
  html += '</div>';

  if (!rows.length) {
    html += '<p class="msg">この月のデータがありません。</p></div>';
    document.getElementById('content').innerHTML = html;
    return;
  }

  // main table
  html += '<div class="table-wrap"><table class="sales"><thead><tr>';
  html += '<th class="date-cell">日付</th>';
  if (hasWeather) html += '<th>天気</th>';
  html += '<th class="r">新規</th>';
  mains.forEach(function(h){
    html += '<th class="r">' + esc(shortLabel(h)) + '</th>';
  });
  html += '</tr></thead><tbody>';

  rows.forEach(function(r){
    const dim = rowIsEmpty(r) ? ' class="dim"' : '';
    html += '<tr' + dim + '>';
    html += '<td class="date-cell">' + esc(dayLabel(r)) + '</td>';
    if (hasWeather) {
      const wx = r.values['天気'];
      html += '<td class="wx">' + (wx && String(wx).trim() ? esc(String(wx).trim()) : dash()) + '</td>';
    }
    const nv = newOfRow(r);
    html += '<td class="r">' + (nv === null ? dash() : Math.round(nv).toLocaleString()) + '</td>';
    mains.forEach(function(h){
      html += cellHtml(h, valFor(r, h));
    });
    html += '</tr>';
  });

  // footer totals for main
  html += '</tbody><tfoot><tr>';
  html += '<td class="date-cell">合計</td>';
  if (hasWeather) html += '<td></td>';
  html += '<td class="r">' + (anyNew ? Math.round(newT).toLocaleString() : dash()) + '</td>';
  mains.forEach(function(h){
    if (isUnitCol(h) || h === '備考') {
      html += '<td class="r muted">' + dash() + '</td>';
      return;
    }
    if (isSumCol(h)) {
      const t = sumField(h);
      const cls = h === '総売上' ? 'r main' : (isMoneyCol(h) ? 'r money' : 'r');
      html += '<td class="' + cls + '">' + (t === null ? dash() : (isMoneyCol(h) ? yen(t) : Math.round(t).toLocaleString())) + '</td>';
    } else {
      html += '<td class="r">' + dash() + '</td>';
    }
  });
  html += '</tr></tfoot></table></div>';

  // detail table
  if (details.length) {
    html += '<div class="detail-wrap' + (showDetail ? ' show' : '') + '" id="detailWrap">';
    html += '<p class="hint" style="margin-top:14px;margin-bottom:8px">スプシのその他の列</p>';
    html += '<div class="table-wrap"><table class="sales"><thead><tr>';
    html += '<th class="date-cell">日付</th>';
    details.forEach(function(h){
      html += '<th class="r">' + esc(shortLabel(h)) + '</th>';
    });
    html += '</tr></thead><tbody>';
    rows.forEach(function(r){
      const dim = rowIsEmpty(r) ? ' class="dim"' : '';
      html += '<tr' + dim + '>';
      html += '<td class="date-cell">' + esc(dayLabel(r)) + '</td>';
      details.forEach(function(h){
        html += cellHtml(h, r.values[h]);
      });
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

boot();
</script>

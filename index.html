<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>CHARGE シフト希望提出</title>
<script>
window.onerror = function(msg, src, line, col){
  var box = document.createElement('div');
  box.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#D45B6A;color:#fff;' +
    'padding:14px 16px;font-family:sans-serif;font-size:13px;z-index:9999;white-space:pre-wrap';
  box.textContent = 'クライアントエラー: ' + msg + ' (行:' + line + ')';
  document.body.prepend(box);
  return false;
};
</script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{
  --bg:#F5F7FA; --surface:#FFFFFF; --ink:#1C2433; --muted:#6B7686;
  --line:#E4E9F0; --accent:#FFC400; --accent-ink:#3A2E00; --lgreen:#06C755; --risk:#D45B6A;
  --chip:#EEF2F7;
}
*{box-sizing:border-box}
body{margin:0;padding:16px;padding-bottom:28px;background:var(--bg);color:var(--ink);
  font-family:"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;font-size:14px;line-height:1.6}
.phone{max-width:430px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:18px 20px 20px}
h1{font-size:16px;margin:0 0 4px}
.sub{font-size:12px;color:var(--muted);margin:0 0 12px}
.hint{font-size:11px;color:var(--muted);margin:0 0 10px;line-height:1.5}
.sec{font-size:12px;font-weight:700;margin:14px 0 8px;color:var(--ink)}
.test-banner{background:color-mix(in srgb, var(--accent) 20%, var(--surface));border:1px solid var(--accent);
  border-radius:8px;padding:6px 10px;font-size:11px;margin-bottom:12px;display:none}
.linklist button{
  display:block;width:100%;text-align:left;border:1px solid var(--line);background:var(--bg);
  color:var(--ink);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer
}

.chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px}
.chip{
  border:1px solid var(--line);background:var(--chip);color:var(--ink);
  border-radius:999px;padding:6px 11px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer
}
.chip:active{transform:scale(0.98)}
.chip.danger{color:var(--risk);border-color:color-mix(in srgb, var(--risk) 35%, var(--line))}

/* pattern card */
.pat-card{
  background:var(--bg);border:1px solid var(--line);border-radius:14px;
  padding:12px;margin:0 0 12px
}
.pat-row{
  display:grid;grid-template-columns:22px 40px 1fr auto 1fr;gap:6px;align-items:center;
  margin-bottom:8px
}
.pat-row:last-of-type{margin-bottom:0}
.pat-row label.name{font-size:12.5px;font-weight:700}
.pat-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--lgreen)}
.pat-row select{
  width:100%;border:1px solid var(--line);border-radius:8px;padding:6px 2px;
  background:var(--surface);font-family:inherit;font-size:12.5px
}
.pat-row .tilde{color:var(--muted);font-size:12px;text-align:center}
.pat-actions{display:flex;gap:8px;margin-top:10px}
.pat-actions button{
  flex:1;border:0;border-radius:10px;padding:11px 8px;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer
}
.pat-actions .primary{background:var(--ink);color:#fff}
.pat-actions .ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line)}

.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:8px}
.cal .wd{font-size:10px;text-align:center;color:var(--muted);font-weight:600;padding-bottom:2px}
.cal .wd.sun{color:var(--risk)}
.cal .wd.sat{color:#3B82F6}
.day{
  aspect-ratio:1;border:1px solid var(--line);border-radius:9px;background:var(--surface);
  color:var(--ink);font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0
}
.day.blank{visibility:hidden;pointer-events:none}
.day.sun{color:var(--risk)}
.day.sat{color:#3B82F6}
.day.on-off{background:var(--risk);border-color:var(--risk);color:#fff}
.day.on-work{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}

.summary{
  background:var(--bg);border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;margin:0 0 12px;font-size:12.5px
}
.summary strong{font-size:14px}
.summary .list{margin-top:6px;color:var(--muted);line-height:1.55;word-break:break-all}

.rows{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:240px;overflow:auto}
.row{
  display:grid;grid-template-columns:56px 1fr auto 1fr 28px;gap:6px;align-items:center;
  background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:8px 10px
}
.row .date-label{font-size:12px;font-weight:700;white-space:nowrap}
.row select{width:100%;border:1px solid var(--line);border-radius:8px;padding:6px 2px;background:var(--surface);font-family:inherit;font-size:12.5px}
.row .del{border:0;background:transparent;color:var(--muted);font-size:15px;cursor:pointer;padding:0}
.row .tilde{color:var(--muted);font-size:12px}

textarea{
  width:100%;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);
  font-family:inherit;font-size:13px;padding:8px 10px;resize:vertical;min-height:52px;margin-bottom:12px
}
.submit{
  width:100%;border:0;border-radius:12px;padding:13px 0;background:var(--lgreen);color:#fff;
  font-size:14.5px;font-weight:700;font-family:inherit;cursor:pointer
}
.submit:disabled{opacity:.45;cursor:not-allowed}
.success .big{font-size:40px;color:var(--lgreen);text-align:center}
.msg{font-size:13px;color:var(--muted);text-align:center;margin:20px 0}
.foot{text-align:center;font-size:10px;color:#9AA3AF;margin-top:10px}
</style>
</head>
<body>
<div class="phone" id="app">
  <div class="test-banner" id="testBanner">テストモードです</div>
  <div id="content"><p class="msg">読み込み中…</p></div>
  <div class="foot">web v2.1</div>
</div>
<script>
const LIFF_ID = '2010649060-f8YllUzm';
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxeXoT_E22dAyb_rz7hH0Q0_JeJqqhNJyV-VfGtvDpVjVZlEtUH4wxKUY8i64H66VFT/exec';

let myProfile = null;
let staffInfo = null;
let ctx = null;
/** 休み希望: Set<number> */
let offDays = new Set();
/** 出勤可能: { [day:number]: {start:number, end:number} } */
let workByDay = {};
/** パターンUIの記憶（再描画後も維持） */
let pat = {
  wdOn: true, weOn: true,
  wdStart: null, wdEnd: null,
  weStart: null, weEnd: null
};

function api(payload){
  return fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(!j.ok) throw new Error(j.error || 'サーバーエラー');
      return j.data;
    });
}

function setStatus(text){
  document.getElementById('content').innerHTML = '<p class="msg">' + text + '</p>';
}
function showError(label, err){
  const msg = (err && err.message) ? err.message : String(err);
  document.getElementById('content').innerHTML =
    '<p class="msg" style="color:var(--risk)">エラー（' + label + '）<br>' + msg + '</p>';
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad2(n){ return String(n).padStart(2,'0'); }
function monthLabel(){ return ctx.year + '年' + ctx.month + '月'; }
function dateStr(day){ return ctx.year + '-' + pad2(ctx.month) + '-' + pad2(day); }
function dowOf(day){ return (ctx.firstDow + day - 1) % 7; }
function isWeekend(day){ const d = dowOf(day); return d === 0 || d === 6; }
function fmtTime(t){ return Math.floor(t) + ':' + (t % 1 ? '30' : '00'); }
function sortedDays(objOrSet){
  if(objOrSet instanceof Set) return Array.from(objOrSet).sort(function(a,b){ return a-b; });
  return Object.keys(objOrSet).map(Number).sort(function(a,b){ return a-b; });
}
function dayChipLabel(day){
  const w = ['日','月','火','水','木','金','土'][dowOf(day)];
  return day + '日(' + w + ')';
}
function normalizeRange(s, e){
  s = parseFloat(s); e = parseFloat(e);
  if(isNaN(s)) s = ctx.store.open;
  if(isNaN(e)) e = ctx.store.close;
  if(e <= s) e = Math.min(s + 1, ctx.store.close);
  return { start: s, end: e };
}

function boot(){
  setStatus('LIFFを初期化中…');
  if(typeof liff === 'undefined'){
    enterTestMode('LIFF SDKを読み込めませんでした');
    return;
  }
  let done = false;
  const fallback = function(reason){
    if(done) return;
    done = true;
    enterTestMode(reason);
  };
  setTimeout(function(){ fallback('LIFF初期化が10秒以内に完了しませんでした'); }, 10000);
  liff.init({ liffId: LIFF_ID }).then(function(){
    if(done) return;
    done = true;
    setStatus('ログイン確認中…');
    if(!liff.isLoggedIn()){ liff.login(); return; }
    liff.getProfile().then(function(p){
      myProfile = { userId: p.userId, displayName: p.displayName };
      setStatus('スタッフ情報を確認中…');
      checkLink();
    }).catch(function(err){ showError('プロフィール取得', err); });
  }).catch(function(err){
    fallback('LIFF初期化エラー: ' + ((err && err.message) ? err.message : String(err)));
  });
}

function enterTestMode(reason){
  myProfile = { userId: 'TEST_USER', displayName: 'テストユーザー' };
  const banner = document.getElementById('testBanner');
  banner.style.display = 'block';
  banner.textContent = 'テストモードです（' + reason + '）';
  setStatus('スタッフ情報を確認中…（テストモード）');
  checkLink();
}

function checkLink(){
  api({ action: 'findStaff', userId: myProfile.userId })
    .then(function(staff){
      if(staff){ staffInfo = staff; loadForm(); }
      else { showLinkScreen(); }
    })
    .catch(function(err){ showError('スタッフ確認', err); });
}

function showLinkScreen(){
  setStatus('スタッフ一覧を読み込み中…');
  api({ action: 'unlinked' })
    .then(function(list){
      const c = document.getElementById('content');
      if(!list.length){
        c.innerHTML = '<p class="msg">登録されているスタッフが見つかりませんでした。オーナーに確認してください。</p>';
        return;
      }
      let html = '<h1>はじめまして！</h1><p class="sub">下の一覧からご自身のお名前をタップしてください（初回だけです）</p><div class="linklist">';
      list.forEach(function(s){
        html += '<button type="button" onclick="doLink(' + s.row + ')">' + esc(s.name) + '（' + esc(s.storeName) + '）</button>';
      });
      html += '</div>';
      c.innerHTML = html;
    })
    .catch(function(err){ showError('スタッフ一覧取得', err); });
}

function doLink(row){
  setStatus('設定中…');
  api({ action: 'link', row: row, userId: myProfile.userId })
    .then(function(staff){
      staffInfo = staff;
      loadForm();
    })
    .catch(function(err){ showError('紐付け', err); });
}

function loadForm(){
  setStatus('読み込み中…');
  api({ action: 'context', storeId: staffInfo.storeId })
    .then(function(c){
      ctx = c;
      offDays = new Set();
      workByDay = {};
      pat.wdStart = ctx.store.open;
      pat.wdEnd = ctx.store.close;
      pat.weStart = ctx.store.open;
      pat.weEnd = ctx.store.close;
      pat.wdOn = true;
      pat.weOn = true;
      renderForm();
    })
    .catch(function(err){ showError('フォーム情報取得', err); });
}

function timeOpts(open, close, sel){
  let s = '';
  for(let t = open; t <= close + 1e-9; t += 0.5){
    const v = Math.round(t * 2) / 2;
    s += '<option value="' + v + '"' + (v === sel ? ' selected' : '') + '>' + fmtTime(v) + '</option>';
  }
  return s;
}

function buildCalHtml(mode){
  const wds = ['日','月','火','水','木','金','土'];
  let cal = wds.map(function(w, i){
    const cls = i === 0 ? 'wd sun' : (i === 6 ? 'wd sat' : 'wd');
    return '<div class="' + cls + '">' + w + '</div>';
  }).join('');
  for(let i = 0; i < ctx.firstDow; i++) cal += '<button type="button" class="day blank" tabindex="-1"></button>';
  for(let d = 1; d <= ctx.daysInMonth; d++){
    const dow = dowOf(d);
    let cls = 'day';
    if(dow === 0) cls += ' sun';
    if(dow === 6) cls += ' sat';
    const on = (mode === 'off') ? offDays.has(d) : !!workByDay[d];
    if(on) cls += (mode === 'off' ? ' on-off' : ' on-work');
    cal += '<button type="button" class="' + cls + '" data-d="' + d + '" onclick="toggleDay(' + d + ')">' + d + '</button>';
  }
  return '<div class="cal">' + cal + '</div>';
}

function quickChipsHtml(mode){
  return '<div class="chips">' +
    '<button type="button" class="chip" onclick="selectWeekdays(\'' + mode + '\')">平日を追加</button>' +
    '<button type="button" class="chip" onclick="selectWeekends(\'' + mode + '\')">土日を追加</button>' +
    '<button type="button" class="chip" onclick="selectAll(\'' + mode + '\')">月すべて追加</button>' +
    '<button type="button" class="chip danger" onclick="clearDays(\'' + mode + '\')">クリア</button>' +
    '</div>';
}

function renderForm(){
  const c = document.getElementById('content');
  const fixed = String(staffInfo.fixed).toUpperCase() === 'TRUE';

  if(fixed){
    c.innerHTML = '<h1>' + esc(staffInfo.name) + 'さん</h1>' +
      '<p class="sub">固定勤務のため、' + monthLabel() + '分の提出は不要です🎉<br>変更したい日がある場合はオーナーに直接ご連絡ください。</p>';
    return;
  }

  if(staffInfo.mode === '休み希望のみ'){
    renderOffForm();
    return;
  }
  renderWorkForm();
}

/* ========== 休み希望のみ ========== */
function renderOffForm(){
  const c = document.getElementById('content');
  const days = sortedDays(offDays);
  const summaryList = days.length
    ? days.map(dayChipLabel).join('、')
    : 'まだ選ばれていません（休みなしでも提出できます）';

  c.innerHTML =
    '<h1>' + esc(staffInfo.name) + 'さん</h1>' +
    '<p class="sub">' + monthLabel() + 'の<strong>休みたい日</strong>をタップ</p>' +
    '<p class="hint">まとめて選ぶボタンもあります。もう一度タップすると解除。最後に1回だけ提出します。</p>' +
    quickChipsHtml('off') +
    buildCalHtml('off') +
    '<div class="summary"><strong>休み希望：' + days.length + '日</strong>' +
      '<div class="list">' + esc(summaryList) + '</div></div>' +
    '<textarea id="noteInput" placeholder="補足があれば（例：午前のみ可 など）"></textarea>' +
    '<button type="button" class="submit" onclick="submitOff()">この内容で提出する（' + days.length + '日）</button>';
}

/* ========== 出勤可能日時 ========== */
function savePatFromDom(){
  const wdOn = document.getElementById('patWdOn');
  const weOn = document.getElementById('patWeOn');
  const wdS = document.getElementById('patWdStart');
  const wdE = document.getElementById('patWdEnd');
  const weS = document.getElementById('patWeStart');
  const weE = document.getElementById('patWeEnd');
  if(wdOn) pat.wdOn = wdOn.checked;
  if(weOn) pat.weOn = weOn.checked;
  if(wdS && wdE){
    const r = normalizeRange(wdS.value, wdE.value);
    pat.wdStart = r.start; pat.wdEnd = r.end;
  }
  if(weS && weE){
    const r = normalizeRange(weS.value, weE.value);
    pat.weStart = r.start; pat.weEnd = r.end;
  }
}

function patternCardHtml(){
  const wdS = pat.wdStart != null ? pat.wdStart : ctx.store.open;
  const wdE = pat.wdEnd != null ? pat.wdEnd : ctx.store.close;
  const weS = pat.weStart != null ? pat.weStart : ctx.store.open;
  const weE = pat.weEnd != null ? pat.weEnd : ctx.store.close;
  return '' +
    '<div class="pat-card">' +
      '<p class="hint" style="margin:0 0 10px">平日と土日で時間が違っても、<strong>ここで一度に入れて</strong>、最後に1回提出できます。</p>' +
      '<div class="pat-row">' +
        '<input type="checkbox" id="patWdOn"' + (pat.wdOn ? ' checked' : '') + '>' +
        '<label class="name" for="patWdOn">平日</label>' +
        '<select id="patWdStart">' + timeOpts(ctx.store.open, ctx.store.close - 0.5, wdS) + '</select>' +
        '<span class="tilde">〜</span>' +
        '<select id="patWdEnd">' + timeOpts(ctx.store.open + 0.5, ctx.store.close, wdE) + '</select>' +
      '</div>' +
      '<div class="pat-row">' +
        '<input type="checkbox" id="patWeOn"' + (pat.weOn ? ' checked' : '') + '>' +
        '<label class="name" for="patWeOn">土日</label>' +
        '<select id="patWeStart">' + timeOpts(ctx.store.open, ctx.store.close - 0.5, weS) + '</select>' +
        '<span class="tilde">〜</span>' +
        '<select id="patWeEnd">' + timeOpts(ctx.store.open + 0.5, ctx.store.close, weE) + '</select>' +
      '</div>' +
      '<div class="pat-actions">' +
        '<button type="button" class="primary" onclick="applyPatternsOnce()">まとめて反映（平日＋土日）</button>' +
        '<button type="button" class="ghost" onclick="clearDays(\'work\')">クリア</button>' +
      '</div>' +
    '</div>';
}

function renderWorkForm(){
  const c = document.getElementById('content');
  const days = sortedDays(workByDay);
  const summaryList = days.length
    ? days.map(function(d){
        const t = workByDay[d];
        return dayChipLabel(d) + ' ' + fmtTime(t.start) + '〜' + fmtTime(t.end);
      }).join(' ／ ')
    : '上の「まとめて反映」か、カレンダーをタップしてください';

  let rowsHtml = '';
  if(days.length){
    rowsHtml =
      '<div class="sec">個別に直す（任意）</div>' +
      '<div class="rows">' + days.map(function(d){
        const t = workByDay[d];
        return '<div class="row">' +
          '<div class="date-label">' + dayChipLabel(d) + '</div>' +
          '<select onchange="updateWorkTime(' + d + ',\'start\',this.value)">' +
            timeOpts(ctx.store.open, ctx.store.close - 0.5, t.start) + '</select>' +
          '<span class="tilde">〜</span>' +
          '<select onchange="updateWorkTime(' + d + ',\'end\',this.value)">' +
            timeOpts(ctx.store.open + 0.5, ctx.store.close, t.end) + '</select>' +
          '<button type="button" class="del" onclick="removeWorkDay(' + d + ')" aria-label="削除">✕</button>' +
          '</div>';
      }).join('') + '</div>';
  }

  c.innerHTML =
    '<h1>' + esc(staffInfo.name) + 'さん</h1>' +
    '<p class="sub">' + monthLabel() + 'の<strong>出勤できる日時</strong></p>' +
    '<div class="sec">① パターンでまとめて入れる</div>' +
    patternCardHtml() +
    '<div class="sec">② カレンダーで微調整</div>' +
    '<p class="hint">黄色＝出勤希望。タップで追加／解除。例外の日だけここで直します。</p>' +
    quickChipsHtml('work') +
    buildCalHtml('work') +
    '<div class="summary"><strong>提出予定：' + days.length + '日</strong>' +
      '<div class="list">' + esc(summaryList) + '</div></div>' +
    rowsHtml +
    '<button type="button" class="submit" ' + (days.length ? '' : 'disabled ') +
      'onclick="submitWork()">③ この内容でまとめて提出（' + days.length + '日）</button>';
}

/** 平日・土日パターンを一度に workByDay へ反映（既存は上書き、未チェック側は触らない） */
function applyPatternsOnce(){
  savePatFromDom();
  if(!pat.wdOn && !pat.weOn){
    alert('平日か土日の、どちらか（または両方）にチェックを入れてください。');
    return;
  }
  let n = 0;
  for(let d = 1; d <= ctx.daysInMonth; d++){
    if(pat.wdOn && !isWeekend(d)){
      workByDay[d] = { start: pat.wdStart, end: pat.wdEnd };
      n++;
    }
    if(pat.weOn && isWeekend(d)){
      workByDay[d] = { start: pat.weStart, end: pat.weEnd };
      n++;
    }
  }
  renderWorkForm();
  // 軽いフィードバック
  const el = document.querySelector('.summary strong');
  if(el) el.textContent = '提出予定：' + sortedDays(workByDay).length + '日（いま ' + n + ' 日を反映）';
}

function toggleDay(d){
  if(staffInfo.mode === '休み希望のみ'){
    if(offDays.has(d)) offDays.delete(d); else offDays.add(d);
    renderOffForm();
    return;
  }
  savePatFromDom();
  if(workByDay[d]){
    delete workByDay[d];
  } else {
    // 追加時は曜日パターンの時間を優先
    if(isWeekend(d)){
      workByDay[d] = { start: pat.weStart != null ? pat.weStart : ctx.store.open, end: pat.weEnd != null ? pat.weEnd : ctx.store.close };
    } else {
      workByDay[d] = { start: pat.wdStart != null ? pat.wdStart : ctx.store.open, end: pat.wdEnd != null ? pat.wdEnd : ctx.store.close };
    }
  }
  renderWorkForm();
}

function selectWeekdays(mode){ selectBy(mode, function(d){ return !isWeekend(d); }); }
function selectWeekends(mode){ selectBy(mode, function(d){ return isWeekend(d); }); }
function selectAll(mode){ selectBy(mode, function(){ return true; }); }

function selectBy(mode, pred){
  if(mode === 'off'){
    for(let d = 1; d <= ctx.daysInMonth; d++){
      if(pred(d)) offDays.add(d);
    }
    renderOffForm();
    return;
  }
  savePatFromDom();
  for(let d = 1; d <= ctx.daysInMonth; d++){
    if(!pred(d)) continue;
    if(isWeekend(d)){
      workByDay[d] = { start: pat.weStart != null ? pat.weStart : ctx.store.open, end: pat.weEnd != null ? pat.weEnd : ctx.store.close };
    } else {
      workByDay[d] = { start: pat.wdStart != null ? pat.wdStart : ctx.store.open, end: pat.wdEnd != null ? pat.wdEnd : ctx.store.close };
    }
  }
  renderWorkForm();
}

function clearDays(mode){
  if(mode === 'off'){
    offDays = new Set();
    renderOffForm();
  } else {
    savePatFromDom();
    workByDay = {};
    renderWorkForm();
  }
}

function updateWorkTime(day, field, val){
  if(!workByDay[day]) return;
  savePatFromDom();
  workByDay[day][field] = parseFloat(val);
  if(workByDay[day].end <= workByDay[day].start){
    workByDay[day].end = Math.min(workByDay[day].start + 1, ctx.store.close);
  }
  renderWorkForm();
}

function removeWorkDay(day){
  savePatFromDom();
  delete workByDay[day];
  renderWorkForm();
}

function submitOff(){
  const list = sortedDays(offDays);
  const noteEl = document.getElementById('noteInput');
  const note = noteEl ? noteEl.value : '';
  const dates = list.map(dateStr);
  if(list.length && !confirm(monthLabel() + 'の休み希望 ' + list.length + '日分を提出します。よろしいですか？')) return;
  if(!list.length && !confirm('休み希望なしで提出します。よろしいですか？')) return;
  setStatus('送信中…');
  api({ action: 'submitDaysOff', staffId: staffInfo.id, storeId: staffInfo.storeId, dates: dates, note: note })
    .then(function(){
      const detail = list.length ? list.map(dayChipLabel).join('、') : '休み希望なし';
      showSuccess(
        list.length ? list.length + '日分の休み希望を提出しました。' : '休み希望なしで提出しました。',
        detail
      );
    })
    .catch(function(err){ showError('提出', err); });
}

function submitWork(){
  const days = sortedDays(workByDay);
  if(!days.length){
    alert('出勤できる日を1日以上入れてください。\n「まとめて反映」かカレンダーで選べます。');
    return;
  }
  const rows = days.map(function(d){
    return { date: dateStr(d), start: workByDay[d].start, end: workByDay[d].end };
  });
  const preview = days.map(function(d){
    return dayChipLabel(d) + ' ' + fmtTime(workByDay[d].start) + '〜' + fmtTime(workByDay[d].end);
  }).join('\n');
  if(!confirm(monthLabel() + 'の出勤希望 ' + days.length + '日分を【1回で】提出します。\n\n' + preview)) return;

  setStatus('送信中…');
  api({ action: 'submitRequests', staffId: staffInfo.id, storeId: staffInfo.storeId, rows: rows })
    .then(function(){
      showSuccess(days.length + '日分の出勤希望をまとめて提出しました。', preview.replace(/\n/g, ' ／ '));
    })
    .catch(function(err){ showError('提出', err); });
}

function showSuccess(text, detail){
  document.getElementById('content').innerHTML =
    '<div class="success"><div class="big">✓</div><h1 style="text-align:center">提出を受け付けました！</h1>' +
    '<p class="msg">' + esc(text) + '</p>' +
    (detail ? '<div class="summary"><div class="list">' + esc(detail) + '</div></div>' : '') +
    '</div>';
}

boot();
</script>
